paths:
  tests: tests
  output: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs
params:
  - env
actor_suffix: Tester
settings:
  colors: true
  memory_limit: 1024M
coverage:
  enabled: true
  c3_url: '%WORDPRESS_URL%/wp-content/plugins/wp-graphql-woocommerce/wp-graphql-woocommerce.php'
  work_dir: /var/www/html/wp-content/plugins/wp-graphql-woocommerce/
  include:
    - 'includes/*'
    - 'access-functions.php'
  exclude:
    - 'local/*'
    - 'vendor/*'
    - 'wp-graphql-woocommerce.php'
  show_only_summary: false
extensions:
  enabled:
    - Codeception\Extension\RunFailed
  commands:
    - Codeception\Command\GenerateWPUnit
    - Codeception\Command\GenerateWPRestApi
    - Codeception\Command\GenerateWPRestController
    - Codeception\Command\GenerateWPRestPostTypeController
    - Codeception\Command\GenerateWPAjax
    - Codeception\Command\GenerateWPCanonical
    - Codeception\Command\GenerateWPXMLRPC
modules:
  config:
    \Tests\WPGraphQL\Codeception\Module\WPGraphQL:
      endpoint: '%WORDPRESS_URL%/graphql'
      modules:
    WPCLI:
      path: '%WP_ROOT_FOLDER%'
      allow-root: true
      throw: true
    WPDb:
      dsn: 'mysql:host=%DB_HOST%;dbname=%DB_NAME%'
      user: '%DB_USER%'
      password: '%DB_PASSWORD%'
      populator: 'mysql -u $user -p$password -h $host $dbname < $dump'
      dump: 'local/db/app_db.sql'
      populate: false
      cleanup: true
      waitlock: 0
      url: '%WORDPRESS_URL%'
      urlReplacement: true
      tablePrefix: '%WP_TABLE_PREFIX%'
    WPBrowser:
      url: '%WORDPRESS_URL%'
      wpRootFolder: '%WP_ROOT_FOLDER%'
      adminUsername: '%ADMIN_USERNAME%'
      adminPassword: '%ADMIN_PASSWORD%'
      adminPath: '/wp-admin'
    REST:
      depends: WPBrowser
      url: '%WORDPRESS_URL%'
      cookies: false
    WPFilesystem:
      wpRootFolder: '%WP_ROOT_FOLDER%'
      plugins: '/wp-content/plugins'
      mu-plugins: '/wp-content/mu-plugins'
      themes: '/wp-content/themes'
      uploads: '/wp-content/uploads'
    WPLoader:
      wpRootFolder: '%WP_ROOT_FOLDER%'
      dbHost: '%DB_HOST%'
      dbName: '%DB_NAME%'
      dbUser: '%DB_USER%'
      dbPassword: '%DB_PASSWORD%'
      dbUrl: 'mysql://%DB_USER%:%DB_PASSWORD%@%DB_HOST%:%DB_PORT%/%DB_NAME%'
      tablePrefix: '%WP_TABLE_PREFIX%'
      domain: '%WORDPRESS_DOMAIN%'
      adminEmail: '%ADMIN_EMAIL%'
      title: 'WooGraphQL Tests'
      plugins:
        - woocommerce/woocommerce.php
        - woocommerce-gateway-stripe/woocommerce-gateway-stripe.php
        - wp-graphql/wp-graphql.php
        - wp-graphql-jwt-authentication/wp-graphql-jwt-authentication.php
        - wp-graphql-woocommerce/wp-graphql-woocommerce.php
      activatePlugins:
        - woocommerce/woocommerce.php
        - woocommerce-gateway-stripe/woocommerce-gateway-stripe.php
        - wp-graphql/wp-graphql.php
        - wp-graphql-jwt-authentication/wp-graphql-jwt-authentication.php
        - wp-graphql-woocommerce/wp-graphql-woocommerce.php
      configFile: 'tests/_data/config.php'
      dump: 'local/db/app_db.sql'
    
    
